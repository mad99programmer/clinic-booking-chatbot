<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>City Clinic — Doctors</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;0,600;0,700;0,900;1,400&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = {
  theme: {
    extend: {
      fontFamily: {
        sans: ['Outfit', 'sans-serif'],
        serif: ['Fraunces', 'serif'],
      },
      colors: {
        purple: {
          50:  '#f4f2ff', 100: '#ebe8ff', 200: '#d4ccff',
          300: '#b0a4f5', 400: '#8b7ce8', 500: '#6650d8',
          600: '#5340c0', 700: '#3d2b96', 800: '#2d1f6e', 900: '#1a1040',
        },
        green: { 400: '#4fe898', 500: '#22d47a', 600: '#17a85f' }
      }
    }
  }
}
</script>
<style>
  * { box-sizing: border-box; }
  body { background: #f8f7ff; font-family: 'Outfit', sans-serif; }

  #sidebar { scrollbar-width: none; }
  #sidebar::-webkit-scrollbar { display: none; }

  .nav-item { transition: all 0.15s; }
  .nav-item:hover { background: rgba(83,64,192,0.08); color: #3d2b96; }
  .nav-item.active {
    background: linear-gradient(135deg, #5340c0, #3d2b96);
    color: white !important;
  }
  .nav-item.active::before {
    content: '';
    position: absolute; left: 0; top: 20%; bottom: 20%;
    width: 3px; background: #22d47a;
    border-radius: 0 3px 3px 0;
  }

  .blob { position: absolute; border-radius: 50%; filter: blur(60px); pointer-events: none; }

  .doctor-card { transition: transform 0.2s, box-shadow 0.2s; }
  .doctor-card:hover { transform: translateY(-2px); box-shadow: 0 10px 28px rgba(83,64,192,0.10); }

  @keyframes fadeUp {
    from { opacity:0; transform:translateY(16px); }
    to   { opacity:1; transform:translateY(0); }
  }
  .fade-up { animation: fadeUp 0.5s ease both; }
  .delay-1 { animation-delay: 0.05s; }
  .delay-2 { animation-delay: 0.10s; }

  .skeleton {
    background: linear-gradient(90deg, #e8e4f8 25%, #f0ecff 50%, #e8e4f8 75%);
    background-size: 200% 100%;
    animation: shimmer 1.5s infinite;
    border-radius: 8px;
  }
  @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

  #overlay { transition: opacity 0.3s; }
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-thumb { background: rgba(83,64,192,0.2); border-radius: 99px; }

  select, input { appearance: none; -webkit-appearance: none; }

  /* drawer */
  #drawer { transition: transform 0.3s cubic-bezier(.4,0,.2,1); }
  #drawer-backdrop { transition: opacity 0.3s; }

  input[type=number]::-webkit-inner-spin-button { opacity: 1; }

  .field-label { font-size: 11px; font-weight: 600; color: #8b7ce8; text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 4px; display: block; }
  .field-input {
    width: 100%; background: #f4f2ff; border: 1.5px solid #d4ccff;
    color: #1a1040; font-size: 14px; border-radius: 12px;
    padding: 9px 14px; outline: none; font-family: 'Outfit', sans-serif;
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  .field-input:focus { border-color: #5340c0; box-shadow: 0 0 0 3px rgba(83,64,192,0.12); }
  .field-input::placeholder { color: #b0a4f5; }
</style>
</head>
<body class="min-h-screen">

<div id="overlay" class="fixed inset-0 bg-purple-900/40 z-40 hidden lg:hidden backdrop-blur-sm" onclick="closeSidebar()"></div>

<!-- ══ SIDEBAR ══ -->

  <div class="px-5 py-5 border-b border-purple-50">
    <div class="flex items-center gap-3">

        <div class="text-[10px] text-purple-400 uppercase tracking-widest font-medium">Admin Panel</div>

    </div>

  <nav class="flex-1 px-3 py-4 flex flex-col gap-0.5">
    <div class="text-[10px] font-semibold text-purple-300 uppercase tracking-widest px-3 mb-2">Main</div>
    <a href="dashboard.html" class="nav-item relative flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium text-purple-600 cursor-pointer">

    <a href="slots.html" class="nav-item relative flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium text-purple-600 cursor-pointer">

    <a href="#" class="nav-item relative flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium text-purple-600 cursor-pointer">

  <div class="px-3 py-4 border-t border-purple-50">
    <div class="flex items-center gap-3 px-3 py-2.5 rounded-xl hover:bg-purple-50 cursor-pointer transition">

<!-- ══ MAIN ══ -->
<div class="lg:ml-60 min-h-screen flex flex-col">

  <!-- TOPBAR -->
  <header class="sticky top-0 z-30 bg-white/90 backdrop-blur-xl border-b border-purple-100 px-5 lg:px-8 h-[60px] flex items-center gap-4 shadow-sm">
    <button onclick="toggleSidebar()" class="lg:hidden text-purple-500 hover:text-purple-700 text-xl p-1">☰</button>
    <div>
      <h1 class="font-serif font-bold text-purple-900 text-lg leading-tight">Doctors</h1>
    </div>
    <div class="ml-auto flex items-center gap-3">
      <span id="doctor-count" class="hidden sm:block text-xs text-purple-400 font-medium"></span>
      <button onclick="openDrawer(null)"
        class="flex items-center gap-2 bg-purple-700 hover:bg-purple-800 text-white text-xs font-semibold px-4 py-2 rounded-xl transition shadow-lg shadow-purple-200">
        <span class="text-base leading-none">+</span> Add Doctor
      </button>
    </div>
  </header>

  <!-- PAGE CONTENT -->
  <main class="flex-1 px-5 lg:px-8 py-7 relative overflow-hidden">

    <div class="blob w-96 h-96 bg-purple-200/40 -top-20 -right-20 z-0"></div>
    <div class="blob w-64 h-64 bg-green-400/15 bottom-10 left-10 z-0"></div>

    <div class="relative z-10">

      <!-- filter / search bar -->
      <div class="fade-up mb-5 flex flex-wrap gap-3 items-center">
        <div class="relative flex-1 min-w-[200px] max-w-xs">
          <span class="absolute left-3 top-1/2 -translate-y-1/2 text-purple-300 text-sm">🔍</span>
          <input type="text" id="search-input" placeholder="Search doctors…" oninput="renderCards()"
            class="w-full bg-white border border-purple-200 text-purple-900 text-sm rounded-xl pl-9 pr-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-purple-300 placeholder-purple-300">
        </div>
        <div class="relative">
          <select id="filter-status" onchange="renderCards()"
            class="bg-white border border-purple-200 text-purple-900 text-sm rounded-xl px-3 py-2.5 pr-8 focus:outline-none focus:ring-2 focus:ring-purple-300 cursor-pointer appearance-none">
            <option value="">All statuses</option>
            <option value="active">Active</option>
            <option value="inactive">Inactive</option>
          </select>
          <span class="absolute right-2.5 top-1/2 -translate-y-1/2 text-purple-400 pointer-events-none text-xs">▾</span>
        </div>
        <div class="relative">
          <select id="filter-spec" onchange="renderCards()"
            class="bg-white border border-purple-200 text-purple-900 text-sm rounded-xl px-3 py-2.5 pr-8 focus:outline-none focus:ring-2 focus:ring-purple-300 cursor-pointer appearance-none">
            <option value="">All specializations</option>
          </select>
          <span class="absolute right-2.5 top-1/2 -translate-y-1/2 text-purple-400 pointer-events-none text-xs">▾</span>

      </div>

      <!-- CARDS GRID -->

        <!-- skeleton cards -->
        <div class="bg-white border border-purple-100 rounded-2xl p-5 shadow-sm">
          <div class="flex items-center gap-3 mb-4">
            <div class="skeleton w-12 h-12 rounded-2xl"></div>
            <div class="flex-1"><div class="skeleton h-4 w-32 mb-2"></div><div class="skeleton h-3 w-20"></div></div>
          </div>
          <div class="skeleton h-3 w-full mb-2"></div>
          <div class="skeleton h-3 w-3/4"></div>
        </div>
        <div class="bg-white border border-purple-100 rounded-2xl p-5 shadow-sm">
          <div class="flex items-center gap-3 mb-4">
            <div class="skeleton w-12 h-12 rounded-2xl"></div>
            <div class="flex-1"><div class="skeleton h-4 w-32 mb-2"></div><div class="skeleton h-3 w-20"></div></div>
          </div>
          <div class="skeleton h-3 w-full mb-2"></div>
          <div class="skeleton h-3 w-3/4"></div>
        </div>
        <div class="bg-white border border-purple-100 rounded-2xl p-5 shadow-sm">
          <div class="flex items-center gap-3 mb-4">
            <div class="skeleton w-12 h-12 rounded-2xl"></div>
            <div class="flex-1"><div class="skeleton h-4 w-32 mb-2"></div><div class="skeleton h-3 w-20"></div></div>
          </div>
          <div class="skeleton h-3 w-full mb-2"></div>
          <div class="skeleton h-3 w-3/4"></div>

<!-- ══ DRAWER BACKDROP ══ -->
<div id="drawer-backdrop" class="fixed inset-0 bg-purple-900/40 backdrop-blur-sm z-50 hidden" onclick="closeDrawer()"></div>

<!-- ══ ADD / EDIT DRAWER ══ -->
<div id="drawer" class="fixed top-0 right-0 h-full w-full max-w-md bg-white shadow-2xl shadow-purple-200 z-50 translate-x-full flex flex-col border-l border-purple-100">

  <!-- drawer header -->
  <div class="px-6 py-5 border-b border-purple-50 flex items-center justify-between flex-shrink-0">
    <div>
      <h2 id="drawer-title" class="font-serif font-bold text-purple-900 text-lg">Add Doctor</h2>
      <p id="drawer-subtitle" class="text-purple-400 text-xs mt-0.5">Fill in the details below</p>
    </div>
    <button onclick="closeDrawer()" class="w-8 h-8 rounded-xl bg-purple-50 hover:bg-purple-100 grid place-items-center text-purple-400 hover:text-purple-700 transition text-lg">×</button>
  </div>

  <!-- drawer body -->

      <input type="hidden" id="form-doctor-id">

      <div class="grid grid-cols-1 gap-4">

        <!-- Name -->

          <label class="field-label">Full Name <span class="text-red-400">*</span></label>
          <input id="f-name" type="text" placeholder="Dr. John Smith" required class="field-input">

        <!-- Specialization -->
        <div>
          <label class="field-label">Specialization <span class="text-red-400">*</span></label>

        </div>

        <!-- Qualification -->
        <div>
          <label class="field-label">Qualification</label>
          <input id="f-qual" type="text" placeholder="e.g. MBBS, MD" class="field-input">
        </div>

        <!-- Experience + Fee — 2 col -->
        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="field-label">Experience (yrs)</label>
            <input id="f-exp" type="number" min="0" max="60" placeholder="10" class="field-input">
          </div>
          <div>
            <label class="field-label">Consultation Fee (₹)</label>
            <input id="f-fee" type="number" min="0" placeholder="500" class="field-input">
          </div>
        </div>

        <!-- Duration -->
        <div>
          <label class="field-label">Slot Duration (minutes) <span class="text-red-400">*</span></label>
          <div class="relative">
            <select id="f-duration" required class="field-input pr-8 cursor-pointer">
              <option value="15">15 min</option>
              <option value="20">20 min</option>
              <option value="30" selected>30 min</option>
              <option value="45">45 min</option>
              <option value="60">60 min</option>
            </select>
            <span class="absolute right-3 top-1/2 -translate-y-1/2 text-purple-400 pointer-events-none text-xs">▾</span>
          </div>
        </div>

        <!-- Phone -->
        <div>
          <label class="field-label">Phone</label>
          <input id="f-phone" type="tel" placeholder="+91 98765 43210" class="field-input">
        </div>

        <!-- Email -->
        <div>
          <label class="field-label">Email</label>
          <input id="f-email" type="email" placeholder="doctor@cityclinic.com" class="field-input">
        </div>

      </div>

      <!-- error msg -->
      <div id="form-error" class="hidden mt-4 bg-red-50 border border-red-200 text-red-600 text-xs rounded-xl px-4 py-3"></div>

    </form>
  </div>

  <!-- drawer footer -->
  <div class="px-6 py-4 border-t border-purple-50 flex gap-3 flex-shrink-0">
    <button onclick="closeDrawer()" type="button"
      class="flex-1 text-sm font-semibold text-purple-600 border border-purple-200 bg-purple-50 hover:bg-purple-100 py-2.5 rounded-xl transition">
      Cancel
    </button>
    <button onclick="submitForm(event)" id="submit-btn" type="button"
      class="flex-1 text-sm font-semibold text-white bg-purple-700 hover:bg-purple-800 py-2.5 rounded-xl transition shadow-lg shadow-purple-200">
      Save Doctor
    </button>
  </div>
</div>

<!-- ══ TOGGLE CONFIRM MODAL ══ -->
<div id="toggle-modal" class="fixed inset-0 bg-purple-900/40 backdrop-blur-sm z-[60] hidden items-center justify-center flex">
  <div class="bg-white rounded-2xl shadow-2xl shadow-purple-200 p-6 w-full max-w-sm mx-4 border border-purple-100">
    <div id="toggle-icon" class="text-3xl mb-3 text-center"></div>
    <h3 id="toggle-title" class="font-serif font-bold text-purple-900 text-lg text-center mb-1"></h3>
    <p id="toggle-desc" class="text-purple-400 text-sm text-center mb-5"></p>
    <div class="flex gap-3">
      <button onclick="closeToggleModal()" class="flex-1 text-sm font-semibold text-purple-600 border border-purple-200 bg-purple-50 hover:bg-purple-100 py-2.5 rounded-xl transition">
        Cancel
      </button>
      <button id="toggle-confirm-btn" onclick="confirmToggle()"
        class="flex-1 text-sm font-semibold text-white py-2.5 rounded-xl transition shadow-lg">
        Confirm
      </button>
    </div>
  </div>
</div>

<script>
const API = 'http://localhost:8000';

const COLORS = [
  ['bg-purple-100','text-purple-700'],
  ['bg-green-100','text-green-700'],
  ['bg-pink-100','text-pink-700'],
  ['bg-amber-100','text-amber-700'],
  ['bg-cyan-100','text-cyan-700'],
  ['bg-indigo-100','text-indigo-700'],
];
function avatarCls(id) { return COLORS[id % COLORS.length]; }
function initials(name) { return name.split(' ').filter(Boolean).map(w=>w[0]).join('').toUpperCase().slice(0,2); }

let allDoctors = [];
let pendingToggleId = null;
let pendingToggleActive = null;

// ══ LOAD ══
async function loadDoctors() {
  document.getElementById('empty-state').classList.add('hidden');
  document.getElementById('error-state').classList.add('hidden');

  try {
    const res  = await fetch(`${API}/admin/doctors`);
    if(!res.ok) throw new Error();
    allDoctors = await res.json();

    // populate spec filter
    const specs = [...new Set(allDoctors.map(d => d.specialization))].sort();
    const specSel = document.getElementById('filter-spec');
    specSel.innerHTML = '<option value="">All specializations</option>';
    specs.forEach(s => {
      const o = document.createElement('option');
      o.value = s; o.textContent = s;
      specSel.appendChild(o);
    });

    document.getElementById('doctor-count').textContent = `${allDoctors.length} doctor${allDoctors.length !== 1 ? 's' : ''}`;
    renderCards();

  } catch(e) {
    document.getElementById('cards-grid').innerHTML = '';
    document.getElementById('error-state').classList.remove('hidden');
  }
}

// ══ RENDER CARDS ══
function renderCards() {
  const search     = document.getElementById('search-input').value.toLowerCase();
  const filterStat = document.getElementById('filter-status').value;
  const filterSpec = document.getElementById('filter-spec').value;

  let filtered = allDoctors.filter(d => {
    const matchSearch = d.name.toLowerCase().includes(search) || d.specialization.toLowerCase().includes(search);
    const matchStat   = !filterStat || (filterStat === 'active' ? d.is_active : !d.is_active);
    const matchSpec   = !filterSpec || d.specialization === filterSpec;
    return matchSearch && matchStat && matchSpec;
  });

  const grid = document.getElementById('cards-grid');

  if(!filtered.length) {
    grid.innerHTML = '';
    document.getElementById('empty-state').classList.remove('hidden');
    return;
  }
  document.getElementById('empty-state').classList.add('hidden');

  grid.innerHTML = filtered.map((d, i) => {
    const [bg, tc] = avatarCls(d.id);
    const inactiveOverlay = !d.is_active ? 'opacity-60' : '';
    return `
    <div class="doctor-card ${inactiveOverlay} bg-white border border-purple-100 rounded-2xl p-5 shadow-sm fade-up" style="animation-delay:${i*0.04}s">
      <div class="flex items-start gap-3 mb-4">
        <div class="w-12 h-12 rounded-2xl ${bg} ${tc} grid place-items-center text-lg font-bold flex-shrink-0 font-serif">
          ${initials(d.name)}
        </div>
        <div class="flex-1 min-w-0">
          <div class="flex items-center gap-2 flex-wrap">
            <span class="font-semibold text-purple-900 text-sm truncate">${d.name}</span>
            ${d.is_active
              ? `<span class="inline-flex items-center gap-1 bg-green-50 text-green-700 border border-green-200 text-[10px] font-semibold px-2 py-0.5 rounded-full"><span class="w-1.5 h-1.5 rounded-full bg-green-500"></span>Active</span>`
              : `<span class="inline-flex items-center gap-1 bg-red-50 text-red-500 border border-red-200 text-[10px] font-semibold px-2 py-0.5 rounded-full"><span class="w-1.5 h-1.5 rounded-full bg-red-400"></span>Inactive</span>`
            }
          </div>
          <div class="text-purple-400 text-xs mt-0.5 truncate">${d.specialization}</div>
        </div>
      </div>

      <!-- info grid -->
      <div class="grid grid-cols-2 gap-2 mb-4 text-xs">
        <div class="bg-purple-50/60 rounded-xl px-3 py-2">
          <div class="text-purple-300 text-[10px] uppercase tracking-wider mb-0.5">Qualification</div>
          <div class="text-purple-700 font-medium truncate">${d.qualification || '—'}</div>
        </div>
        <div class="bg-purple-50/60 rounded-xl px-3 py-2">
          <div class="text-purple-300 text-[10px] uppercase tracking-wider mb-0.5">Experience</div>
          <div class="text-purple-700 font-medium">${d.experience_years ? d.experience_years + ' yrs' : '—'}</div>
        </div>
        <div class="bg-purple-50/60 rounded-xl px-3 py-2">
          <div class="text-purple-300 text-[10px] uppercase tracking-wider mb-0.5">Fee</div>
          <div class="text-purple-700 font-medium">${d.consultation_fee ? '₹' + d.consultation_fee : '—'}</div>
        </div>
        <div class="bg-green-50/60 rounded-xl px-3 py-2">
          <div class="text-green-400 text-[10px] uppercase tracking-wider mb-0.5">Slots left</div>
          <div class="text-green-700 font-serif font-bold text-base leading-tight">${d.available_slots}</div>
        </div>
      </div>

      <!-- contact -->
      ${(d.phone || d.email) ? `
      <div class="mb-4 space-y-1">
        ${d.phone ? `<div class="flex items-center gap-2 text-xs text-purple-500"><span>📞</span><span>${d.phone}</span></div>` : ''}
        ${d.email ? `<div class="flex items-center gap-2 text-xs text-purple-500"><span>✉️</span><span class="truncate">${d.email}</span></div>` : ''}
      </div>` : ''}

      <!-- actions -->
      <div class="flex gap-2 pt-3 border-t border-purple-50">
        <button onclick="openDrawer(${d.id})"
          class="flex-1 text-xs font-semibold text-purple-600 border border-purple-200 bg-purple-50 hover:bg-purple-100 py-2 rounded-xl transition">
          ✏️ Edit
        </button>
        <button onclick="openToggleModal(${d.id}, ${d.is_active})"
          class="flex-1 text-xs font-semibold py-2 rounded-xl transition border
          ${d.is_active
            ? 'text-red-500 border-red-200 bg-red-50 hover:bg-red-100'
            : 'text-green-600 border-green-200 bg-green-50 hover:bg-green-100'}">
          ${d.is_active ? '🚫 Deactivate' : '✅ Reactivate'}
        </button>
      </div>
    </div>`;
  }).join('');
}

// ══ DRAWER ══
function openDrawer(doctorId) {
  clearForm();
  if(doctorId) {
    const d = allDoctors.find(x => x.id === doctorId);
    if(!d) return;
    document.getElementById('drawer-title').textContent    = 'Edit Doctor';
    document.getElementById('drawer-subtitle').textContent = `Editing ${d.name}`;
    document.getElementById('form-doctor-id').value = d.id;
    document.getElementById('f-name').value     = d.name;
    document.getElementById('f-spec').value     = d.specialization;
    document.getElementById('f-qual').value     = d.qualification || '';
    document.getElementById('f-exp').value      = d.experience_years || '';
    document.getElementById('f-fee').value      = d.consultation_fee || '';
    document.getElementById('f-duration').value = d.consultation_duration || 30;
    document.getElementById('f-phone').value    = d.phone || '';
    document.getElementById('f-email').value    = d.email || '';
    document.getElementById('submit-btn').textContent = 'Update Doctor';
  } else {
    document.getElementById('drawer-title').textContent    = 'Add Doctor';
    document.getElementById('drawer-subtitle').textContent = 'Fill in the details below';
    document.getElementById('submit-btn').textContent      = 'Save Doctor';
  }
  document.getElementById('drawer').classList.remove('translate-x-full');
  document.getElementById('drawer-backdrop').classList.remove('hidden');
  document.body.style.overflow = 'hidden';
}

function closeDrawer() {
  document.getElementById('drawer').classList.add('translate-x-full');
  document.getElementById('drawer-backdrop').classList.add('hidden');
  document.body.style.overflow = '';
}

function clearForm() {
  document.getElementById('form-doctor-id').value = '';
  ['f-name','f-spec','f-qual','f-exp','f-fee','f-phone','f-email'].forEach(id => {
    document.getElementById(id).value = '';
  });
  document.getElementById('f-duration').value = '30';
  document.getElementById('form-error').classList.add('hidden');
}

// ══ SUBMIT ══
async function submitForm(e) {
  if(e) e.preventDefault();
  const btn = document.getElementById('submit-btn');
  const errEl = document.getElementById('form-error');
  errEl.classList.add('hidden');

  const doctorId = document.getElementById('form-doctor-id').value;
  const payload  = {
    name:                  document.getElementById('f-name').value.trim(),
    specialization:        document.getElementById('f-spec').value.trim(),
    qualification:         document.getElementById('f-qual').value.trim() || null,
    experience_years:      parseInt(document.getElementById('f-exp').value) || null,
    consultation_fee:      parseInt(document.getElementById('f-fee').value) || null,
    consultation_duration: parseInt(document.getElementById('f-duration').value),
    phone:                 document.getElementById('f-phone').value.trim() || null,
    email:                 document.getElementById('f-email').value.trim() || null,
  };

  if(!payload.name || !payload.specialization) {
    errEl.textContent = 'Name and Specialization are required.';
    errEl.classList.remove('hidden');
    return;
  }

  btn.disabled = true;
  btn.textContent = doctorId ? 'Updating…' : 'Saving…';

  try {
    const url    = doctorId ? `${API}/admin/doctors/${doctorId}` : `${API}/admin/doctors`;
    const method = doctorId ? 'PUT' : 'POST';
    const res    = await fetch(url, {
      method,
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });
    if(!res.ok) {
      const err = await res.json();
      throw new Error(err.detail || 'Request failed');
    }
    closeDrawer();
    await loadDoctors();
  } catch(err) {
    errEl.textContent = err.message || 'Something went wrong';
    errEl.classList.remove('hidden');
  } finally {
    btn.disabled = false;
    btn.textContent = doctorId ? 'Update Doctor' : 'Save Doctor';
  }
}

// ══ TOGGLE ACTIVE ══
function openToggleModal(id, isActive) {
  pendingToggleId     = id;
  pendingToggleActive = isActive;
  const doctor = allDoctors.find(d => d.id === id);
  document.getElementById('toggle-icon').textContent  = isActive ? '🚫' : '✅';
  document.getElementById('toggle-title').textContent = isActive ? 'Deactivate Doctor?' : 'Reactivate Doctor?';
  document.getElementById('toggle-desc').textContent  = isActive
    ? `${doctor?.name} will no longer appear in the WhatsApp bot.`
    : `${doctor?.name} will be available for bookings again.`;
  const btn = document.getElementById('toggle-confirm-btn');
  btn.textContent = isActive ? 'Yes, deactivate' : 'Yes, reactivate';
  btn.className   = isActive
    ? 'flex-1 text-sm font-semibold text-white bg-red-500 hover:bg-red-600 py-2.5 rounded-xl transition shadow-lg shadow-red-200'
    : 'flex-1 text-sm font-semibold text-white bg-green-500 hover:bg-green-600 py-2.5 rounded-xl transition shadow-lg shadow-green-200';
  document.getElementById('toggle-modal').classList.remove('hidden');
  document.getElementById('toggle-modal').classList.add('flex');
}

function closeToggleModal() {
  pendingToggleId = null;
  document.getElementById('toggle-modal').classList.add('hidden');
  document.getElementById('toggle-modal').classList.remove('flex');
}

async function confirmToggle() {
  if(!pendingToggleId) return;
  const btn = document.getElementById('toggle-confirm-btn');
  btn.disabled = true; btn.textContent = '…';
  try {
    const res = await fetch(`${API}/admin/doctors/${pendingToggleId}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ is_active: !pendingToggleActive })
    });
    if(!res.ok) throw new Error();
    closeToggleModal();
    await loadDoctors();
  } catch(e) {
    alert('Failed to update doctor status');
  } finally {
    btn.disabled = false;
  }
}

// close toggle modal on backdrop
document.getElementById('toggle-modal').addEventListener('click', function(e) {
  if(e.target === this) closeToggleModal();
});

// ══ SIDEBAR ══
function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('-translate-x-full');
  document.getElementById('overlay').classList.toggle('hidden');
}
function closeSidebar() {
  document.getElementById('sidebar').classList.add('-translate-x-full');
  document.getElementById('overlay').classList.add('hidden');
}

// ══ INIT ══
loadDoctors();
</script>
</body>
</html>
